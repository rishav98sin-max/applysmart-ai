[theme]
base              = "light"
primaryColor      = "#0F766E"
backgroundColor   = "#FAFAF9"
secondaryBackgroundColor = "#F5F5F4"
textColor         = "#1C1917"
font              = "sans serif"

[server]
headless          = true
# Disable the source-code file watcher entirely in production. On
# Streamlit Cloud hot-reload isn't needed, and the default watcher
# recursively enumerates every loaded Python module — which, with
# transformers / torch / chromadb installed, prints thousands of
# "Examining the path of transformers.models.aria..." tracebacks per
# run because those modules transitively require torchvision (not
# installed here). "none" skips the enumeration entirely.
fileWatcherType   = "none"
folderWatchBlacklist = [
    "venv", ".venv", "__pycache__", ".git", "sessions", "outputs",
    "chroma_db", ".chroma", "node_modules",
]

[logger]
# Silences Streamlit-internal INFO/WARNING noise (e.g. the file-watcher
# module-discovery warnings triggered by transformers sub-modules).
# Application print() statements from our agents are unaffected.
level             = "error"

[browser]
gatherUsageStats  = false

[runner]
# Don't pre-import modules on every rerun — speeds up the fast-rerun cycle
# and avoids the transformers-weights warning spam.
fastReruns        = true
